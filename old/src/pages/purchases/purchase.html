<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Purchase - SuperMart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">

  <div id="sidebar-container"></div>

  <div class="ml-64 min-h-screen p-8">

    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold text-slate-800">Purchase Entry</h1>
        <p class="text-slate-500 text-sm mt-0.5">Record supplier purchases and update inventory</p>
      </div>
      <div id="user-info"></div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 max-w-5xl">

      <!-- Top fields -->
      <div class="grid grid-cols-2 lg:grid-cols-3 gap-5 mb-6">
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Invoice Number</label>
          <input type="text" id="invoiceNumber" readonly
                 class="w-full border border-slate-200 rounded-xl px-4 py-2.5 bg-slate-50 text-slate-400 text-sm cursor-not-allowed">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Purchase Date</label>
          <input type="date" id="purchaseDate"
                 class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-sm text-slate-800">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Supplier Invoice No</label>
          <input type="text" id="supplierInvoiceNo" placeholder="Supplier Bill No"
                 class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-sm text-slate-800">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Party (Supplier)</label>
          <select id="partySelect"
                  class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-sm text-slate-800">
            <option value="">-- Select Supplier --</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Payment Mode</label>
          <select id="purchasePaymentMode"
                  class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-sm text-slate-800">
          </select>
        </div>
      </div>

      <!-- Add item row -->
      <div class="bg-slate-50 rounded-xl p-5 mb-5 border border-slate-200">
        <h3 class="font-semibold text-slate-700 text-sm mb-4 flex items-center gap-2">
          <i class="fas fa-plus-circle text-amber-500"></i> Add Purchase Item
        </h3>
        <div class="flex flex-wrap gap-3 items-end">
          <div class="flex-1 min-w-64">
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Item Name</label>
            <input list="itemList" id="itemSelect" placeholder="Search or select item..."
                   class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-sm text-slate-800">
            <datalist id="itemList"></datalist>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Quantity</label>
            <input type="number" id="purchaseQty" min="1" placeholder="1"
                   class="w-24 border border-slate-300 rounded-xl px-3 py-2.5 focus:outline-none focus:border-amber-500 text-sm text-slate-800">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Rate (₹)</label>
            <input type="number" id="purchaseRate" step="0.01" placeholder="0.00"
                   class="w-28 border border-slate-300 rounded-xl px-3 py-2.5 focus:outline-none focus:border-amber-500 text-sm text-slate-800">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">GST %</label>
            <select id="gstRate"
                    class="border border-slate-300 rounded-xl px-3 py-2.5 focus:outline-none focus:border-amber-500 text-sm text-slate-800">
              <option value="0">0%</option>
              <option value="5" selected>5%</option>
              <option value="12">12%</option>
              <option value="18">18%</option>
              <option value="28">28%</option>
            </select>
          </div>
          <button onclick="addItem()"
                  class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl font-semibold transition flex items-center gap-2 text-sm shadow-sm">
            <i class="fas fa-plus"></i> Add
          </button>
        </div>
      </div>

      <!-- Items table -->
      <div class="rounded-xl overflow-hidden border border-slate-200 mb-5">
        <table class="w-full text-sm">
          <thead class="bg-slate-800 text-white">
            <tr>
              <th class="px-4 py-3 text-left font-semibold text-xs uppercase tracking-wide">Item</th>
              <th class="px-4 py-3 text-left font-semibold text-xs uppercase tracking-wide">UOM</th>
              <th class="px-4 py-3 text-left font-semibold text-xs uppercase tracking-wide">Qty</th>
              <th class="px-4 py-3 text-left font-semibold text-xs uppercase tracking-wide">Rate</th>
              <th class="px-4 py-3 text-left font-semibold text-xs uppercase tracking-wide">GST%</th>
              <th class="px-4 py-3 text-left font-semibold text-xs uppercase tracking-wide">Amount</th>
              <th class="px-4 py-3 text-left font-semibold text-xs uppercase tracking-wide"></th>
            </tr>
          </thead>
          <tbody id="purchaseItemsBody" class="divide-y divide-slate-100"></tbody>
        </table>
      </div>

      <!-- Grand total -->
      <div class="text-right mb-6 bg-amber-50 rounded-xl p-4 border border-amber-200">
        <span class="text-slate-500 text-sm font-semibold mr-3">Grand Total</span>
        <span id="grandTotal" class="text-3xl font-bold text-amber-600">₹ 0.00</span>
      </div>

      <!-- Action buttons -->
      <div class="flex gap-3 flex-wrap">
        <button onclick="clearPurchase()"
                class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-5 py-2.5 rounded-xl font-semibold transition text-sm flex items-center gap-2">
          <i class="fas fa-trash"></i> Clear
        </button>
        <button onclick="savePurchase()"
                class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2.5 rounded-xl font-semibold transition text-sm flex items-center gap-2 shadow-sm">
          <i class="fas fa-save"></i> Save Purchase
        </button>
        <button onclick="printPurchase()"
                class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl font-semibold transition text-sm flex items-center gap-2 shadow-sm">
          <i class="fas fa-print"></i> Print
        </button>
      </div>
    </div>

    <!-- History -->
    <div class="max-w-5xl mt-8">
      <h2 class="text-base font-semibold text-slate-500 uppercase tracking-wider mb-4">Purchase History</h2>
      <div id="purchaseHistoryList" class="space-y-3"></div>
    </div>
  </div>

  <script src="../../api/client.js"></script>
  <script src="../../api/parties.api.js"></script>
  <script src="../../api/items.api.js"></script>
  <script src="../../api/purchases.api.js"></script>
  <script src="../../api/payments.api.js"></script>
  <script src="../../utils/formatters.js"></script>
  <script src="../../components/sidebar.js"></script>
  <script src="purchase.js"></script>
</body>
</html>
