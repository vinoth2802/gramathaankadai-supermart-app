<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Purchase Report - SuperMart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="sidebar-container"></div>
  <div class="ml-64 min-h-screen p-8">
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold text-slate-800">Purchase Report</h1>
        <p class="text-slate-500 text-sm mt-0.5">Detailed purchase transactions by date range</p>
      </div>
      <div id="user-info"></div>
    </div>

    <!-- Filter -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
      <div class="flex flex-wrap gap-4 items-end">
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">From Date</label>
          <input type="date" id="fromDate" class="border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-sm text-slate-800">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">To Date</label>
          <input type="date" id="toDate" class="border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-sm text-slate-800">
        </div>
        <button onclick="applyFilter()" class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2.5 rounded-xl font-semibold transition text-sm">Apply</button>
        <button onclick="resetFilter()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-6 py-2.5 rounded-xl font-semibold transition text-sm">Reset</button>
      </div>
    </div>

    <!-- Total + Records -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-4">
      <div class="flex items-center justify-between pb-4 border-b border-slate-100 mb-2">
        <div>
          <p class="text-slate-400 text-xs font-semibold uppercase tracking-wide mb-1">Total Purchase</p>
          <p id="purchaseTotal" class="text-4xl font-bold text-amber-600">₹ 0</p>
        </div>
        <p class="text-slate-400 text-xs">Click a row to view items</p>
      </div>
      <table class="w-full text-sm">
        <thead class="bg-slate-800 text-white">
          <tr>
            <th class="px-4 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Date</th>
            <th class="px-4 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Invoice</th>
            <th class="px-4 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Party / Supplier</th>
            <th class="px-4 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Mode</th>
            <th class="px-4 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Amount</th>
            <th class="px-4 py-3.5 text-center font-semibold text-xs uppercase tracking-wide w-20"></th>
          </tr>
        </thead>
        <tbody id="purchaseTable" class="divide-y divide-slate-100"></tbody>
      </table>
    </div>
  </div>

  <script src="../../api/client.js"></script>
  <script src="../../api/purchases.api.js"></script>
  <script src="../../utils/formatters.js"></script>
  <script src="../../components/sidebar.js"></script>
  <script>
    checkAuth();

    function setDefaultDates() {
      document.getElementById('fromDate').value = Formatters.daysAgo(30);
      document.getElementById('toDate').value   = Formatters.today();
    }

    function togglePurchaseDetail(id) {
      const detail = document.getElementById('pd-' + id);
      const icon   = document.getElementById('pi-' + id);
      if (!detail) return;
      const isOpen = !detail.classList.contains('hidden');
      detail.classList.toggle('hidden', isOpen);
      if (icon) icon.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
    }

    function printPurchase(p) {
      const win = window.open('', '_blank');
      win.document.write(`<html><head><title>${p.invoice}</title>
        <style>body{font-family:Arial;padding:40px;}h2{color:#f59e0b;text-align:center;}table{width:100%;border-collapse:collapse;margin:20px 0;}th,td{border:1px solid #ccc;padding:10px;}th{background:#f8fafc;}</style>
        </head><body>
        <h2>SuperMart — Purchase Invoice</h2>
        <p><strong>Invoice:</strong> ${p.invoice}</p>
        <p><strong>Date:</strong> ${p.date}</p>
        <p><strong>Supplier:</strong> ${p.partyName || '—'}</p>
        <p><strong>Payment Mode:</strong> ${p.paymentMode || 'Cash'}</p>
        <hr>
        <table><tr><th>Item</th><th>Qty</th><th>Price</th><th>Total</th></tr>
        ${(p.items||[]).map(i=>`<tr><td>${i.name}</td><td>${i.qty}</td><td>₹${(i.price||0).toFixed(2)}</td><td>₹${(i.total||0).toFixed(2)}</td></tr>`).join('')}
        </table>
        <div style="text-align:right;margin-top:10px;">
          <strong style="font-size:1.2rem">Grand Total: ₹${(p.grandTotal||0).toFixed(2)}</strong>
        </div>
        <p style="text-align:center;margin-top:40px;color:#888;">Generated by SuperMart</p>
        </body></html>`);
      win.document.close();
      setTimeout(() => win.print(), 500);
    }

    async function applyFilter() {
      const from = new Date(document.getElementById('fromDate').value || '2000-01-01');
      const to   = new Date(document.getElementById('toDate').value   || new Date());
      to.setHours(23, 59, 59);
      const filtered = await PurchasesAPI.getByDateRange(from, to);
      const total    = filtered.reduce((s, r) => s + (r.grandTotal || 0), 0);
      document.getElementById('purchaseTotal').textContent = Formatters.currency(total);

      const tbody = document.getElementById('purchaseTable');
      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="px-4 py-12 text-center text-slate-400">No purchases in this period.</td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map(p => `
        <tr class="hover:bg-amber-50 cursor-pointer transition-colors" onclick="togglePurchaseDetail(${p.id})">
          <td class="px-4 py-3 text-slate-400 text-xs font-mono">${p.date}</td>
          <td class="px-4 py-3 font-semibold text-slate-800 font-mono text-xs">${p.invoice}</td>
          <td class="px-4 py-3 text-slate-700 font-medium">${p.partyName || '—'}</td>
          <td class="px-4 py-3">
            <span class="text-xs bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full font-medium">${p.paymentMode || 'Cash'}</span>
          </td>
          <td class="px-4 py-3 font-bold text-amber-600">${Formatters.currency(p.grandTotal)}</td>
          <td class="px-4 py-3 text-center">
            <i id="pi-${p.id}" class="fas fa-chevron-down text-slate-400 text-xs transition-transform duration-200"></i>
          </td>
        </tr>
        <tr id="pd-${p.id}" class="hidden bg-slate-50">
          <td colspan="6" class="px-6 py-5">
            <div class="flex items-start justify-between gap-6">
              <!-- Items table -->
              <div class="flex-1">
                <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-3">
                  <i class="fas fa-list mr-1.5"></i>Items Purchased
                </p>
                <table class="w-full text-sm border border-slate-200 rounded-xl overflow-hidden">
                  <thead class="bg-slate-700 text-white">
                    <tr>
                      <th class="px-4 py-2.5 text-left text-xs font-semibold uppercase tracking-wide">Item Name</th>
                      <th class="px-4 py-2.5 text-center text-xs font-semibold uppercase tracking-wide">Qty</th>
                      <th class="px-4 py-2.5 text-right text-xs font-semibold uppercase tracking-wide">Price</th>
                      <th class="px-4 py-2.5 text-right text-xs font-semibold uppercase tracking-wide">Total</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-slate-100 bg-white">
                    ${(p.items||[]).map(i => `
                      <tr class="hover:bg-slate-50">
                        <td class="px-4 py-2.5 text-slate-800 font-medium">${i.name}</td>
                        <td class="px-4 py-2.5 text-center text-slate-500">${i.qty}</td>
                        <td class="px-4 py-2.5 text-right text-slate-500">${Formatters.currency(i.price||0)}</td>
                        <td class="px-4 py-2.5 text-right font-semibold text-slate-700">${Formatters.currency(i.total||0)}</td>
                      </tr>`).join('')}
                  </tbody>
                </table>
              </div>
              <!-- Summary + actions -->
              <div class="w-52 flex-shrink-0">
                <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-3">
                  <i class="fas fa-receipt mr-1.5"></i>Summary
                </p>
                <div class="bg-white border border-slate-200 rounded-xl p-4 space-y-2 text-sm mb-3">
                  <div class="flex justify-between text-slate-500">
                    <span>Supplier</span>
                    <span class="font-medium text-slate-700">${p.partyName || '—'}</span>
                  </div>
                  <div class="flex justify-between text-slate-500">
                    <span>Mode</span>
                    <span class="font-medium text-slate-700">${p.paymentMode || 'Cash'}</span>
                  </div>
                  <div class="flex justify-between text-slate-500">
                    <span>Items</span>
                    <span class="font-medium text-slate-700">${(p.items||[]).length}</span>
                  </div>
                  <div class="border-t border-slate-100 pt-2 flex justify-between font-bold text-base">
                    <span class="text-slate-700">Total</span>
                    <span class="text-amber-600">${Formatters.currency(p.grandTotal)}</span>
                  </div>
                </div>
                <button onclick="event.stopPropagation(); printPurchase(${JSON.stringify(p).replace(/"/g,'&quot;')})"
                        class="w-full bg-slate-700 hover:bg-slate-800 text-white text-sm font-semibold py-2 rounded-xl transition flex items-center justify-center gap-2">
                  <i class="fas fa-print"></i> Print
                </button>
              </div>
            </div>
          </td>
        </tr>`).join('');
    }

    function resetFilter() { setDefaultDates(); applyFilter(); }
    setDefaultDates(); applyFilter();
  </script>
</body>
</html>
