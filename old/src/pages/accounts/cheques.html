<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cheques - SuperMart</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head><body class="bg-slate-50 min-h-screen">
<div id="sidebar-container"></div>
<div class="ml-64 min-h-screen p-8">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">Cheque Management</h1>
      <p class="text-slate-500 text-sm mt-0.5">Track issued and received cheques</p>
    </div>
    <div id="user-info"></div>
  </div>
  <button onclick="showIssueChequeModal()" class="bg-amber-500 hover:bg-amber-600 text-white px-5 py-2.5 rounded-xl font-semibold mb-5 text-sm flex items-center gap-2 transition shadow-sm">
    <i class="fas fa-plus"></i> Issue New Cheque
  </button>
  <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-slate-200">
    <table class="w-full text-sm">
      <thead class="bg-slate-800 text-white">
        <tr>
          <th class="px-4 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Date</th>
          <th class="px-4 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Cheque No</th>
          <th class="px-4 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Party</th>
          <th class="px-4 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Type</th>
          <th class="px-4 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Amount</th>
          <th class="px-4 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Status</th>
          <th class="px-4 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Action</th>
        </tr>
      </thead>
      <tbody id="chequeBody" class="divide-y divide-slate-100"></tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div id="chequeModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-8">
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-xl font-bold text-slate-800">Issue New Cheque</h2>
      <button onclick="document.getElementById('chequeModal').classList.add('hidden')" class="text-slate-400 hover:text-slate-600 transition"><i class="fas fa-times text-lg"></i></button>
    </div>
    <div class="mb-4">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Party</label>
      <select id="chequeParty" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 text-sm text-slate-800"><option value="">-- Select Party --</option></select>
    </div>
    <div class="mb-4">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Cheque Number</label>
      <input type="text" id="chequeNo" placeholder="e.g. 458912" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 text-sm text-slate-800 font-mono">
    </div>
    <div class="mb-4">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Amount (₹)</label>
      <input type="number" id="chequeAmount" placeholder="Enter amount" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 text-sm text-slate-800">
    </div>
    <div class="mb-7">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Cheque Date</label>
      <input type="date" id="chequeDate" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 text-sm text-slate-800">
    </div>
    <div class="flex gap-3">
      <button onclick="saveCheque()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-xl transition text-sm">
        <i class="fas fa-file-invoice mr-2"></i>Issue Cheque
      </button>
      <button onclick="document.getElementById('chequeModal').classList.add('hidden')" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-3 rounded-xl transition text-sm">Cancel</button>
    </div>
  </div>
</div>

<script src="/src/api/client.js"></script><script src="/src/api/parties.api.js"></script><script src="/src/api/accounts.api.js"></script>
<script src="/src/utils/formatters.js"></script><script src="/src/components/sidebar.js"></script>
<script>
checkAuth(); logAudit('CHEQUES_PAGE_OPENED',{});

async function renderCheques(){
  const cheques = await AccountsAPI.getCheques();
  const tbody = document.getElementById('chequeBody');
  if(!cheques.length){tbody.innerHTML=`<tr><td colspan="7" class="px-4 py-12 text-center text-slate-400 text-sm">No cheques found.</td></tr>`;return;}
  tbody.innerHTML = cheques.map(ch=>{
    const statusClass = ch.status==='Cleared' ? 'bg-emerald-100 text-emerald-700' : ch.status==='Bounced' ? 'bg-rose-100 text-rose-700' : 'bg-amber-100 text-amber-700';
    return `<tr class="hover:bg-slate-50 transition-colors">
      <td class="px-4 py-3 text-slate-500 text-xs font-mono">${ch.date}</td>
      <td class="px-4 py-3 font-bold text-slate-800 font-mono">${ch.chequeNo}</td>
      <td class="px-4 py-3 text-slate-700 font-medium">${ch.partyName}</td>
      <td class="px-4 py-3 text-slate-500">${ch.type}</td>
      <td class="px-4 py-3 font-semibold text-slate-800">${Formatters.currency(ch.amount)}</td>
      <td class="px-4 py-3"><span class="text-xs font-semibold px-2.5 py-1 rounded-full ${statusClass}">${ch.status}</span></td>
      <td class="px-4 py-3"><button onclick="cycleStatus(${ch.id})" class="text-blue-600 hover:text-blue-800 text-xs font-semibold transition"><i class="fas fa-rotate mr-1"></i>Update</button></td>
    </tr>`;
  }).join('');
}

async function cycleStatus(id){
  const cheques = await AccountsAPI.getCheques();
  const ch = cheques.find(c=>c.id===id); if(!ch) return;
  const statuses=["Pending","Cleared","Bounced"];
  ch.status = statuses[(statuses.indexOf(ch.status)+1)%3];
  await AccountsAPI.updateCheque(ch);
  logAudit('CHEQUE_STATUS_UPDATED',{chequeNo:ch.chequeNo,status:ch.status});
  renderCheques();
}

async function showIssueChequeModal(){
  const parties = await PartiesAPI.getAll();
  const sel = document.getElementById('chequeParty');
  sel.innerHTML = '<option value="">-- Select Party --</option>' + parties.map(p=>`<option value="${p.id}">${p.name} (${p.type.toUpperCase()})</option>`).join('');
  document.getElementById('chequeDate').value = Formatters.today();
  document.getElementById('chequeModal').classList.remove('hidden');
}

async function saveCheque(){
  const partyId=document.getElementById('chequeParty').value;
  const chequeNo=document.getElementById('chequeNo').value.trim();
  const amount=parseFloat(document.getElementById('chequeAmount').value);
  const chequeDate=document.getElementById('chequeDate').value;
  if(!partyId||!chequeNo||!amount) return alert('Please fill all required fields');
  const parties=await PartiesAPI.getAll();
  const party=parties.find(p=>p.id==partyId);
  await AccountsAPI.saveCheque({
    date: new Date(chequeDate).toLocaleDateString('en-IN'),
    chequeNo, partyName: party.name, type: 'Issued', amount, status: 'Pending'
  });
  logAudit('CHEQUE_ISSUED',{chequeNo,amount,party:party.name});
  document.getElementById('chequeModal').classList.add('hidden');
  alert('Cheque issued successfully!');
  renderCheques();
}

renderCheques();
window.addEventListener('focus', renderCheques);
</script></body></html>
