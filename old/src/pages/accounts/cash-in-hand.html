<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cash in Hand - SuperMart</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head><body class="bg-slate-50 min-h-screen">
<div id="sidebar-container"></div>
<div class="ml-64 min-h-screen p-8">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">Cash in Hand</h1>
      <p class="text-slate-500 text-sm mt-0.5">Track daily cash flow and balance</p>
    </div>
    <div id="user-info"></div>
  </div>
  <div class="max-w-2xl mx-auto">
    <!-- Balance card -->
    <div class="bg-gradient-to-br from-emerald-500 to-emerald-700 text-white rounded-2xl p-8 text-center mb-6 shadow-lg shadow-emerald-200">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-white/20 rounded-2xl mb-4">
        <i class="fas fa-money-bill-wave text-2xl text-white"></i>
      </div>
      <h3 class="font-semibold text-emerald-100 text-sm uppercase tracking-wide mb-2">Current Cash Balance</h3>
      <p id="cashBalance" class="text-5xl font-bold mb-2">₹ 0.00</p>
      <p class="text-emerald-200 text-xs">As of today</p>
    </div>
    <!-- Action buttons -->
    <div class="flex gap-4 mb-7">
      <button onclick="showModal('in')" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-3.5 rounded-xl font-bold transition shadow-sm text-sm flex items-center justify-center gap-2">
        <i class="fas fa-arrow-down"></i> Cash In
      </button>
      <button onclick="showModal('out')" class="flex-1 bg-rose-600 hover:bg-rose-700 text-white py-3.5 rounded-xl font-bold transition shadow-sm text-sm flex items-center justify-center gap-2">
        <i class="fas fa-arrow-up"></i> Cash Out
      </button>
    </div>
    <h3 class="font-semibold text-slate-500 uppercase tracking-wider text-xs mb-3">Recent Transactions</h3>
    <div id="cashHistory" class="space-y-2.5 max-h-96 overflow-y-auto"></div>
  </div>
</div>

<!-- Modal -->
<div id="cashModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
    <div class="flex items-center justify-between mb-5">
      <h2 id="modalTitle" class="text-xl font-bold text-slate-800">Cash In</h2>
      <button onclick="document.getElementById('cashModal').classList.add('hidden')" class="text-slate-400 hover:text-slate-600 transition"><i class="fas fa-times text-lg"></i></button>
    </div>
    <div class="mb-4">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Amount (₹)</label>
      <input type="number" id="cashAmount" placeholder="Enter amount" class="w-full border border-slate-300 rounded-xl px-4 py-3 text-xl font-bold focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-slate-800">
    </div>
    <div class="mb-7">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Remarks</label>
      <textarea id="cashRemarks" rows="2" placeholder="Sales collection, Purchase, etc."
                class="w-full border border-slate-300 rounded-xl px-4 py-2.5 resize-none focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-sm text-slate-800"></textarea>
    </div>
    <div class="flex gap-3">
      <button onclick="saveTransaction()" id="saveBtn" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-xl transition text-sm">
        <i class="fas fa-save mr-2"></i>Save
      </button>
      <button onclick="document.getElementById('cashModal').classList.add('hidden')" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-3 rounded-xl transition text-sm">Cancel</button>
    </div>
  </div>
</div>

<script src="/src/api/client.js"></script><script src="/src/api/accounts.api.js"></script>
<script src="/src/utils/formatters.js"></script><script src="/src/components/sidebar.js"></script>
<script>
checkAuth(); logAudit('CASH_IN_HAND_PAGE_OPENED',{});
let currentType = 'in';

async function loadBalance(){
  const balance = await AccountsAPI.getCashBalance();
  document.getElementById('cashBalance').textContent = Formatters.currency(balance);
  const history = await AccountsAPI.getCashTransactions();
  document.getElementById('cashHistory').innerHTML = history.slice(0,15).map(tx=>`
    <div class="px-5 py-4 rounded-xl border-l-4 ${tx.type==='in'?'bg-emerald-50 border-emerald-500':'bg-rose-50 border-rose-500'}">
      <div class="flex justify-between items-center">
        <span class="font-bold text-lg ${tx.type==='in'?'text-emerald-600':'text-rose-600'}">${tx.type==='in'?'+':'-'} ${Formatters.currency(tx.amount)}</span>
        <span class="text-xs text-slate-400">${tx.date}</span>
      </div>
      <p class="text-slate-500 text-xs mt-0.5">${tx.remarks}</p>
    </div>`).join('') || '<p class="text-center text-slate-400 py-8 text-sm">No transactions yet.</p>';
}

function showModal(type){
  currentType = type;
  document.getElementById('modalTitle').textContent = type==='in' ? 'Cash In' : 'Cash Out';
  document.getElementById('saveBtn').className = `flex-1 ${type==='in'?'bg-emerald-600 hover:bg-emerald-700':'bg-rose-600 hover:bg-rose-700'} text-white font-semibold py-3 rounded-xl transition text-sm`;
  document.getElementById('cashAmount').value='';
  document.getElementById('cashRemarks').value='';
  document.getElementById('cashModal').classList.remove('hidden');
}

async function saveTransaction(){
  const amount = parseFloat(document.getElementById('cashAmount').value);
  const remarks = document.getElementById('cashRemarks').value.trim() || (currentType==='in'?'Cash received':'Cash paid');
  if(!amount||amount<=0) return alert('Please enter a valid amount');
  if(currentType==='out'){
    const balance = await AccountsAPI.getCashBalance();
    if(amount > balance) return alert('Insufficient cash balance!');
  }
  await AccountsAPI.saveCashTransaction({ type: currentType, amount, remarks, date: new Date().toLocaleString('en-IN') });
  logAudit(`CASH_${currentType.toUpperCase()}`,{amount,remarks});
  document.getElementById('cashModal').classList.add('hidden');
  alert(`Cash ${currentType==='in'?'In':'Out'} recorded!`);
  await loadBalance();
}

loadBalance();
window.addEventListener('focus', loadBalance);
</script></body></html>
