<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Settings - General - SuperMart</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head><body class="bg-slate-50 min-h-screen">
<div id="sidebar-container"></div>
<div class="ml-64 min-h-screen p-8">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">General Settings</h1>
      <p class="text-slate-500 text-sm mt-0.5">Configure your shop information</p>
    </div>
    <div id="user-info"></div>
  </div>
  <div class="max-w-2xl">
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8">
      <div class="flex items-center gap-3 mb-6 pb-5 border-b border-slate-100">
        <div class="w-10 h-10 bg-amber-100 rounded-xl flex items-center justify-center">
          <i class="fas fa-store text-amber-600"></i>
        </div>
        <div>
          <h2 class="font-semibold text-slate-800">Shop Information</h2>
          <p class="text-slate-400 text-xs mt-0.5">Basic details shown on invoices and reports</p>
        </div>
      </div>
      <div class="mb-5">
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Shop Name</label>
        <input type="text" value="Gramathaankadai" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-sm text-slate-800" placeholder="Enter shop name">
      </div>
      <div class="mb-5">
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">GSTIN Number</label>
        <input type="text" value="33AAACC1234D1Z5" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-sm text-slate-800 font-mono" placeholder="GSTIN">
      </div>
      <div class="mb-5">
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Address</label>
        <textarea class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 resize-none text-sm text-slate-800" rows="3">Salem, Tamil Nadu</textarea>
      </div>
      <div class="mb-7">
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Phone Number</label>
        <input type="tel" value="9876543210" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-sm text-slate-800">
      </div>
      <button onclick="alert('General settings saved!')" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition shadow-sm text-sm flex items-center justify-center gap-2">
        <i class="fas fa-save"></i> Save General Settings
      </button>
    </div>
  </div>
</div>
<script src="/src/api/client.js"></script><script src="/src/utils/formatters.js"></script><script src="/src/components/sidebar.js"></script>
<script>checkAuth();</script></body></html>
