<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Settings - UOM - SuperMart</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head><body class="bg-slate-50 min-h-screen">
<div id="sidebar-container"></div>
<div class="ml-64 min-h-screen p-8">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">Unit of Measurement</h1>
      <p class="text-slate-500 text-sm mt-0.5">Manage UOM codes used in inventory</p>
    </div>
    <div id="user-info"></div>
  </div>
  <button onclick="showAddModal()" class="bg-amber-500 hover:bg-amber-600 text-white px-5 py-2.5 rounded-xl font-semibold mb-5 text-sm flex items-center gap-2 transition shadow-sm">
    <i class="fas fa-plus"></i> Add New UOM
  </button>
  <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-slate-200">
    <table class="w-full text-sm">
      <thead class="bg-slate-800 text-white">
        <tr>
          <th class="px-5 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">UOM Code</th>
          <th class="px-5 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Description</th>
          <th class="px-5 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Actions</th>
        </tr>
      </thead>
      <tbody id="uomBody" class="divide-y divide-slate-100"></tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div id="uomModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
    <div class="flex items-center justify-between mb-6">
      <h2 id="modalTitle" class="text-xl font-bold text-slate-800">Add New UOM</h2>
      <button onclick="document.getElementById('uomModal').classList.add('hidden')" class="text-slate-400 hover:text-slate-600 transition"><i class="fas fa-times text-lg"></i></button>
    </div>
    <form id="uomForm">
      <input type="hidden" id="editId">
      <div class="mb-4">
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">UOM Code * (e.g. KG, PCS)</label>
        <input type="text" id="uomCode" required placeholder="KG" style="text-transform:uppercase"
               class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-sm text-slate-800 font-mono">
      </div>
      <div class="mb-7">
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Description</label>
        <input type="text" id="uomDesc" required placeholder="Kilogram"
               class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-sm text-slate-800">
      </div>
      <div class="flex gap-3">
        <button type="submit" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-xl transition text-sm">
          <i class="fas fa-save mr-2"></i>Save UOM
        </button>
        <button type="button" onclick="document.getElementById('uomModal').classList.add('hidden')" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-3 rounded-xl transition text-sm">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script src="/src/api/client.js"></script><script src="/src/api/accounts.api.js"></script>
<script src="/src/utils/formatters.js"></script><script src="/src/components/sidebar.js"></script>
<script>
checkAuth();
async function renderUOMs(){
  const uoms = await AccountsAPI.getUOMs();
  document.getElementById('uomBody').innerHTML = uoms.map(u=>`
    <tr class="hover:bg-slate-50 transition-colors">
      <td class="px-5 py-3.5 font-bold text-slate-800 font-mono">${u.code}</td>
      <td class="px-5 py-3.5 text-slate-600">${u.desc}</td>
      <td class="px-5 py-3.5 flex gap-3">
        <button onclick="editUOM(${u.id})" class="text-blue-600 hover:text-blue-800 text-sm font-semibold transition"><i class="fas fa-pencil mr-1"></i>Edit</button>
        <button onclick="deleteUOM(${u.id})" class="text-rose-500 hover:text-rose-700 text-sm font-semibold transition"><i class="fas fa-trash mr-1"></i>Delete</button>
      </td>
    </tr>`).join('');
}
function showAddModal(){
  document.getElementById('modalTitle').textContent='Add New UOM';
  document.getElementById('uomForm').reset();
  document.getElementById('editId').value='';
  document.getElementById('uomModal').classList.remove('hidden');
}
async function editUOM(id){
  const uoms = await AccountsAPI.getUOMs();
  const u = uoms.find(x=>x.id===id); if(!u) return;
  document.getElementById('modalTitle').textContent='Edit UOM';
  document.getElementById('editId').value=u.id;
  document.getElementById('uomCode').value=u.code;
  document.getElementById('uomDesc').value=u.desc;
  document.getElementById('uomModal').classList.remove('hidden');
}
async function deleteUOM(id){
  if(!confirm('Delete this UOM?')) return;
  await AccountsAPI.deleteUOM(id); renderUOMs();
}
document.getElementById('uomForm').addEventListener('submit', async e=>{
  e.preventDefault();
  const editId = document.getElementById('editId').value;
  const code = document.getElementById('uomCode').value.trim().toUpperCase();
  const desc = document.getElementById('uomDesc').value.trim();
  if(!code||!desc) return alert('Code and Description required');
  const uom = { code, desc };
  if(editId) uom.id = parseInt(editId);
  await AccountsAPI.saveUOM(uom);
  document.getElementById('uomModal').classList.add('hidden');
  renderUOMs();
});
renderUOMs();
</script></body></html>
