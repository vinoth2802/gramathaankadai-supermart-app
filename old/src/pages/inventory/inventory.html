<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inventory - SuperMart</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
.dropdown-menu{display:none;position:absolute;right:0;top:100%;margin-top:4px;background:white;box-shadow:0 10px 25px -5px rgba(0,0,0,0.15),0 4px 6px -2px rgba(0,0,0,0.05);border-radius:12px;min-width:170px;overflow:hidden;z-index:9999;border:1px solid #e2e8f0;}
.dropdown-menu.show{display:block;}
.dropdown-menu button{width:100%;padding:10px 16px;text-align:left;border:none;background:none;cursor:pointer;font-size:0.85rem;display:flex;align-items:center;gap:10px;color:#334155;transition:background 0.1s;}
.dropdown-menu button:hover{background:#f8fafc;}
.dropdown-menu button.del{color:#e11d48;}
.dropdown-menu button.del:hover{background:#fff1f2;}
.low-stock td{background:#fff7ed!important;}
.expiry-soon td{background:#fff1f2!important;}
</style>
</head><body class="bg-slate-50 min-h-screen">
<div id="sidebar-container"></div>
<div class="ml-64 min-h-screen p-8">

  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">Inventory</h1>
      <p class="text-slate-500 text-sm mt-0.5">Manage your stock and item catalogue</p>
    </div>
    <div id="user-info"></div>
  </div>

  <!-- Alert box -->
  <div id="alertBox" class="bg-amber-50 border border-amber-200 border-l-4 border-l-amber-500 px-5 py-3.5 rounded-xl mb-5 flex justify-between items-center">
    <span class="text-amber-800 font-semibold text-sm"><i class="fas fa-triangle-exclamation mr-2 text-amber-500"></i>Alerts:</span>
    <span id="alertText" class="text-amber-700 text-sm font-medium">0 low stock | 0 near expiry</span>
  </div>

  <!-- Toolbar -->
  <div class="flex flex-wrap gap-2.5 mb-5">
    <button onclick="showAddModal(false)" class="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2.5 rounded-lg font-semibold text-sm flex items-center gap-2 transition shadow-sm">
      <i class="fas fa-plus"></i> Add Item
    </button>
    <button onclick="showAddModal(true)" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2.5 rounded-lg font-semibold text-sm flex items-center gap-2 transition shadow-sm">
      <i class="fas fa-layer-group"></i> Bulk Add
    </button>
    <button onclick="exportInventory()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-lg font-semibold text-sm flex items-center gap-2 transition shadow-sm">
      <i class="fas fa-download"></i> Export
    </button>
    <button onclick="filterLowStock()" class="bg-rose-600 hover:bg-rose-700 text-white px-4 py-2.5 rounded-lg font-semibold text-sm flex items-center gap-2 transition shadow-sm">
      <i class="fas fa-triangle-exclamation"></i> Low Stock
    </button>
    <button onclick="loadAll()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-4 py-2.5 rounded-lg font-semibold text-sm flex items-center gap-2 transition">
      <i class="fas fa-list"></i> All Items
    </button>
  </div>

  <!-- Table -->
  <div class="bg-white rounded-xl shadow-sm border border-slate-200" style="overflow:visible">
    <table id="inventoryTable" class="w-full text-sm">
      <thead class="bg-slate-800 text-white">
        <tr>
          <th class="px-4 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">#</th>
          <th class="px-4 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Item Name</th>
          <th class="px-4 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">UOM</th>
          <th class="px-4 py-3.5 text-center font-semibold text-xs uppercase tracking-wide">Stock</th>
          <th class="px-4 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Purchase ₹</th>
          <th class="px-4 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">MRP ₹</th>
          <th class="px-4 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Sale ₹</th>
          <th class="px-4 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">GST%</th>
          <th class="px-4 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Expiry</th>
          <th class="px-4 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Status</th>
          <th class="px-4 py-3.5 text-center font-semibold text-xs uppercase tracking-wide">Actions</th>
        </tr>
      </thead>
      <tbody id="tableBody" class="divide-y divide-slate-100"></tbody>
    </table>
  </div>
</div>

<!-- Add/Edit Modal -->
<div id="addModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl p-8 max-h-[92vh] overflow-y-auto">
    <div class="flex items-center justify-between mb-6">
      <h2 id="modalTitle" class="text-xl font-bold text-slate-800">Add New Item</h2>
      <button onclick="hideAddModal()" class="text-slate-400 hover:text-slate-600 transition"><i class="fas fa-times text-lg"></i></button>
    </div>
    <form id="addForm">
      <input type="hidden" id="editId">
      <div class="grid grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Short Name *</label>
          <input type="text" id="shortName" required placeholder="e.g. Rice" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-sm text-slate-800">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Item Code</label>
          <input type="text" id="itemCode" placeholder="e.g. 1010" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-sm text-slate-800">
        </div>
      </div>
      <div class="grid grid-cols-3 gap-4 mb-4">
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Category</label>
          <input type="text" id="category" placeholder="Grocery" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 text-sm text-slate-800">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">HSN Code</label>
          <input type="text" id="hsnCode" placeholder="1006080" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 text-sm text-slate-800">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">UOM</label>
          <select id="uomSelect" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 text-sm text-slate-800"></select>
        </div>
      </div>
      <div class="grid grid-cols-4 gap-4 mb-4">
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Purchase ₹ *</label>
          <input type="number" id="purchasePrice" step="0.01" required class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 text-sm text-slate-800">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">MRP ₹ *</label>
          <input type="number" id="mrp" step="0.01" required class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 text-sm text-slate-800">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Sales ₹ *</label>
          <input type="number" id="salesPrice" step="0.01" required class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 text-sm text-slate-800">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">GST %</label>
          <input type="number" id="gstRate" value="5" step="0.01" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 text-sm text-slate-800">
        </div>
      </div>
      <div class="grid grid-cols-2 gap-4 mb-7">
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Expiry Date</label>
          <input type="date" id="expiryDate" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 text-sm text-slate-800">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Opening Stock</label>
          <input type="number" id="openingStock" value="0" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 text-sm text-slate-800">
        </div>
      </div>
      <div class="flex gap-3">
        <button type="submit" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-xl transition shadow-sm">
          <i class="fas fa-save mr-2"></i>Save Item
        </button>
        <button type="button" onclick="hideAddModal()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-3 rounded-xl transition">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>

<script src="/src/api/client.js"></script><script src="/src/api/items.api.js"></script><script src="/src/api/accounts.api.js"></script>
<script src="/src/utils/formatters.js"></script><script src="/src/components/sidebar.js"></script>
<script>
checkAuth();
logAudit('INVENTORY_PAGE_OPENED',{});
let allProducts = [];

async function loadAll(){
  allProducts = await ItemsAPI.getAll();
  renderTable(allProducts);
  updateAlerts();
}

function renderTable(products){
  const now = new Date(); const soon = new Date(); soon.setDate(soon.getDate()+30);
  let idx=0;
  document.getElementById('tableBody').innerHTML = products.map(p => {
    idx++;
    const stock = p.stock||0;
    const isLow = stock <= (p.reorderLevel||10);
    const isExpiry = p.expiryDate && new Date(p.expiryDate) <= soon;
    const rowClass = isLow ? 'low-stock' : isExpiry ? 'expiry-soon' : '';
    const statusBadge = isLow
      ? '<span class="text-xs bg-rose-100 text-rose-700 px-2.5 py-1 rounded-full font-semibold">Low Stock</span>'
      : isExpiry
      ? '<span class="text-xs bg-amber-100 text-amber-700 px-2.5 py-1 rounded-full font-semibold">Near Expiry</span>'
      : '<span class="text-xs bg-emerald-100 text-emerald-700 px-2.5 py-1 rounded-full font-semibold">Normal</span>';
    return `<tr class="${rowClass} hover:bg-slate-50 transition-colors">
      <td class="px-4 py-3 text-slate-400 text-sm">${idx}</td>
      <td class="px-4 py-3 font-semibold text-slate-800">${p.shortName||'—'}</td>
      <td class="px-4 py-3 text-slate-500 text-sm">${p.uom||'KG'}</td>
      <td class="px-4 py-3 text-center font-bold text-sm ${stock<=5?'text-rose-600':'text-emerald-600'}">${stock}</td>
      <td class="px-4 py-3 text-slate-600 text-sm">₹${(p.purchasePrice||0).toFixed(2)}</td>
      <td class="px-4 py-3 text-slate-600 text-sm">₹${(p.mrp||0).toFixed(2)}</td>
      <td class="px-4 py-3 font-semibold text-amber-600 text-sm">₹${(p.salesPrice||0).toFixed(2)}</td>
      <td class="px-4 py-3 text-slate-500 text-sm">${p.gstRate||5}%</td>
      <td class="px-4 py-3 text-slate-400 text-xs font-mono">${p.expiryDate||'—'}</td>
      <td class="px-4 py-3">${statusBadge}</td>
      <td class="px-4 py-3 text-center">
        <div class="relative inline-block">
          <button onclick="toggleDropdown(this)" class="w-8 h-8 flex items-center justify-center text-slate-400 hover:bg-slate-100 rounded-lg text-xl transition">⋮</button>
          <div class="dropdown-menu">
            <button onclick="editItem(${p.id})"><i class="fas fa-pencil text-slate-400"></i> Edit</button>
            <button onclick="deleteItem(${p.id})" class="del"><i class="fas fa-trash"></i> Delete</button>
          </div>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function updateAlerts(){
  const low = allProducts.filter(p=>(p.stock||0)<=(p.reorderLevel||10)).length;
  const soon = new Date(); soon.setDate(soon.getDate()+30);
  const exp = allProducts.filter(p=>p.expiryDate&&new Date(p.expiryDate)<=soon).length;
  document.getElementById('alertText').textContent = `${low} low stock | ${exp} near expiry`;
}

function filterLowStock(){ renderTable(allProducts.filter(p=>(p.stock||0)<10)); }

function toggleDropdown(btn){
  document.querySelectorAll('.dropdown-menu').forEach(m=>m.classList.remove('show'));
  btn.nextElementSibling.classList.add('show');
}
document.addEventListener('click', e=>{ if(!e.target.closest('.relative')) document.querySelectorAll('.dropdown-menu').forEach(m=>m.classList.remove('show')); });

async function showAddModal(isBulk=false){
  document.getElementById('modalTitle').textContent = 'Add New Item';
  document.getElementById('addForm').reset();
  document.getElementById('editId').value='';
  document.getElementById('openingStock').value='0';
  await populateUOM();
  document.getElementById('addModal').classList.remove('hidden');
}

function hideAddModal(){ document.getElementById('addModal').classList.add('hidden'); }

async function populateUOM(){
  const uoms = await AccountsAPI.getUOMs();
  const sel = document.getElementById('uomSelect');
  sel.innerHTML = uoms.map(u=>`<option value="${u.code}">${u.code} - ${u.desc}</option>`).join('');
}

async function editItem(id){
  const p = await ItemsAPI.getById(id);
  if(!p) return;
  document.getElementById('modalTitle').textContent='Edit Item';
  document.getElementById('editId').value=p.id;
  document.getElementById('shortName').value=p.shortName||'';
  document.getElementById('itemCode').value=p.itemCode||'';
  document.getElementById('category').value=p.category||'';
  document.getElementById('hsnCode').value=p.hsnCode||'';
  document.getElementById('purchasePrice').value=p.purchasePrice||0;
  document.getElementById('mrp').value=p.mrp||0;
  document.getElementById('salesPrice').value=p.salesPrice||0;
  document.getElementById('gstRate').value=p.gstRate||5;
  document.getElementById('expiryDate').value=p.expiryDate||'';
  document.getElementById('openingStock').value=p.stock||0;
  await populateUOM();
  document.getElementById('uomSelect').value=p.uom||'KG';
  document.getElementById('addModal').classList.remove('hidden');
}

document.getElementById('addForm').addEventListener('submit', async e=>{
  e.preventDefault();
  const editId = document.getElementById('editId').value;
  const item = {
    shortName: document.getElementById('shortName').value.trim(),
    itemCode:  document.getElementById('itemCode').value.trim(),
    category:  document.getElementById('category').value.trim()||'General',
    hsnCode:   document.getElementById('hsnCode').value.trim(),
    uom:       document.getElementById('uomSelect').value,
    purchasePrice: parseFloat(document.getElementById('purchasePrice').value)||0,
    mrp:       parseFloat(document.getElementById('mrp').value)||0,
    salesPrice:parseFloat(document.getElementById('salesPrice').value)||0,
    gstRate:   parseFloat(document.getElementById('gstRate').value)||5,
    expiryDate:document.getElementById('expiryDate').value||'',
    stock:     parseFloat(document.getElementById('openingStock').value)||0,
    reorderLevel: 10
  };
  if(editId) item.id = parseInt(editId);
  await ItemsAPI.save(item);
  logAudit('ITEM_SAVED',{name:item.shortName});
  alert('Item saved!');
  hideAddModal();
  await loadAll();
});

async function deleteItem(id){
  if(!confirm('Delete this item?')) return;
  allProducts = allProducts.filter(p => p.id !== id);
  renderTable(allProducts);
  updateAlerts();
  await ItemsAPI.delete(id);
  logAudit('ITEM_DELETED',{id});
}

async function exportInventory(){
  const products = await ItemsAPI.getAll();
  let csv="S.No,Item Name,Item Code,Category,UOM,Stock,Purchase ₹,MRP ₹,Sales ₹,GST%,Expiry\n";
  products.forEach((p,i)=>{
    csv+=`${i+1},"${p.shortName||''}","${p.itemCode||''}","${p.category||''}","${p.uom||''}",${p.stock||0},${p.purchasePrice||0},${p.mrp||0},${p.salesPrice||0},${p.gstRate||5},"${p.expiryDate||''}"\n`;
  });
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=`Inventory_${new Date().toISOString().slice(0,10)}.csv`;a.click();
}

loadAll();
</script></body></html>
