<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard - SuperMart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen">

  <div id="sidebar-container"></div>

  <div class="ml-64 min-h-screen">
    <div class="p-8">

      <!-- Header -->
      <div class="flex items-center justify-between mb-8">
        <div>
          <h1 class="text-2xl font-bold text-slate-800">Dashboard</h1>
          <p class="text-slate-500 text-sm mt-0.5">Welcome back, <span id="welcomeUser" class="font-semibold text-amber-600">Admin</span></p>
        </div>
        <div class="flex items-center gap-4 text-sm text-slate-500">
          <span class="hidden sm:block">Login: <strong id="loginTimeDisplay" class="text-slate-700">—</strong></span>
          <span class="bg-amber-50 border border-amber-200 text-amber-700 px-3 py-1.5 rounded-full font-semibold text-xs tracking-wide" id="runningTime">00:00:00</span>
          <div id="user-info"></div>
        </div>
      </div>

      <!-- Stats Grid -->
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-5 mb-8">

        <!-- Today's Sales -->
        <div class="bg-gradient-to-br from-emerald-500 to-emerald-600 rounded-xl p-5 text-white shadow-md shadow-emerald-200 col-span-2 lg:col-span-1">
          <div class="flex items-start justify-between">
            <div>
              <p class="text-emerald-100 text-xs font-semibold uppercase tracking-wide mb-2">Today's Sales</p>
              <p id="today-sales" class="text-2xl font-bold">₹ 0</p>
            </div>
            <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center">
              <i class="fas fa-store text-white text-lg"></i>
            </div>
          </div>
        </div>

        <!-- Total Sales -->
        <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-200 flex items-start gap-4">
          <div class="w-11 h-11 bg-emerald-100 rounded-xl flex items-center justify-center flex-shrink-0">
            <i class="fas fa-chart-line text-emerald-600 text-lg"></i>
          </div>
          <div>
            <p class="text-slate-500 text-xs font-semibold uppercase tracking-wide mb-1">Total Sales</p>
            <p id="total-sales" class="text-xl font-bold text-slate-800">₹ 0</p>
          </div>
        </div>

        <!-- Total Purchase -->
        <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-200 flex items-start gap-4">
          <div class="w-11 h-11 bg-amber-100 rounded-xl flex items-center justify-center flex-shrink-0">
            <i class="fas fa-truck text-amber-600 text-lg"></i>
          </div>
          <div>
            <p class="text-slate-500 text-xs font-semibold uppercase tracking-wide mb-1">Total Purchase</p>
            <p id="total-purchase" class="text-xl font-bold text-slate-800">₹ 0</p>
          </div>
        </div>

        <!-- Low Stock -->
        <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-200 flex items-start gap-4">
          <div class="w-11 h-11 bg-rose-100 rounded-xl flex items-center justify-center flex-shrink-0">
            <i class="fas fa-triangle-exclamation text-rose-600 text-lg"></i>
          </div>
          <div>
            <p class="text-slate-500 text-xs font-semibold uppercase tracking-wide mb-1">Low Stock</p>
            <p id="low-stock" class="text-xl font-bold text-slate-800">0 items</p>
          </div>
        </div>

        <!-- Receivable -->
        <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-200 flex items-start gap-4">
          <div class="w-11 h-11 bg-blue-100 rounded-xl flex items-center justify-center flex-shrink-0">
            <i class="fas fa-arrow-down text-blue-600 text-lg"></i>
          </div>
          <div>
            <p class="text-slate-500 text-xs font-semibold uppercase tracking-wide mb-1">Receivable</p>
            <p id="receivable" class="text-xl font-bold text-slate-800">₹ 0</p>
          </div>
        </div>

        <!-- Payable -->
        <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-200 flex items-start gap-4">
          <div class="w-11 h-11 bg-orange-100 rounded-xl flex items-center justify-center flex-shrink-0">
            <i class="fas fa-arrow-up text-orange-600 text-lg"></i>
          </div>
          <div>
            <p class="text-slate-500 text-xs font-semibold uppercase tracking-wide mb-1">Payable</p>
            <p id="payable" class="text-xl font-bold text-slate-800">₹ 0</p>
          </div>
        </div>

        <!-- Reorder Alerts -->
        <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-200 flex items-start gap-4 col-span-2">
          <div class="w-11 h-11 bg-rose-100 rounded-xl flex items-center justify-center flex-shrink-0">
            <i class="fas fa-bell text-rose-600 text-lg"></i>
          </div>
          <div>
            <p class="text-slate-500 text-xs font-semibold uppercase tracking-wide mb-1">Reorder Alerts</p>
            <p id="reorder-alerts" class="text-xl font-bold text-slate-800">0 items</p>
          </div>
        </div>

      </div>

      <!-- Quick Actions -->
      <div class="mb-8">
        <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-3">Quick Actions</h2>
        <div class="grid grid-cols-3 gap-4 max-w-lg">
          <button onclick="navigateTo('../pos/pos.html')"
                  class="flex flex-col items-center gap-2.5 bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 text-white py-5 px-3 rounded-xl transition shadow-sm shadow-emerald-200">
            <i class="fas fa-cash-register text-2xl"></i>
            <span class="text-xs font-semibold">New Sale</span>
          </button>
          <button onclick="navigateTo('../purchases/purchase.html')"
                  class="flex flex-col items-center gap-2.5 bg-amber-500 hover:bg-amber-600 active:bg-amber-700 text-white py-5 px-3 rounded-xl transition shadow-sm shadow-amber-200">
            <i class="fas fa-truck text-2xl"></i>
            <span class="text-xs font-semibold">New Purchase</span>
          </button>
          <button onclick="navigateTo('../reports/daily-sales-summary.html')"
                  class="flex flex-col items-center gap-2.5 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white py-5 px-3 rounded-xl transition shadow-sm shadow-blue-200">
            <i class="fas fa-chart-bar text-2xl"></i>
            <span class="text-xs font-semibold">Daily Summary</span>
          </button>
        </div>
      </div>

      <!-- Charts -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
          <h3 class="font-semibold text-slate-700 text-sm mb-4">Sales Trend (Last 6 Months)</h3>
          <canvas id="salesTrendChart" height="120"></canvas>
        </div>
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
          <h3 class="font-semibold text-slate-700 text-sm mb-4">Sales vs Purchase</h3>
          <canvas id="salesVsPurchaseChart" height="120"></canvas>
        </div>
      </div>

    </div>
  </div>

  <script src="../../api/client.js"></script>
  <script src="../../api/parties.api.js"></script>
  <script src="../../api/items.api.js"></script>
  <script src="../../api/sales.api.js"></script>
  <script src="../../api/purchases.api.js"></script>
  <script src="../../utils/formatters.js"></script>
  <script src="../../components/sidebar.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
