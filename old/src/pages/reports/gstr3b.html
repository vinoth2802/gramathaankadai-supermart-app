<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GSTR-3B Report - SuperMart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">
<div id="sidebar-container"></div>
<div class="ml-64 min-h-screen p-8">

  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">GSTR-3B Report</h1>
      <p class="text-slate-500 text-sm mt-0.5">Monthly summary for GST filing</p>
    </div>
    <div id="user-info"></div>
  </div>

  <!-- Filter -->
  <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
    <div class="flex flex-wrap gap-4 items-end">
      <div>
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">From Date</label>
        <input type="date" id="fromDate" class="border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-sm text-slate-800">
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">To Date</label>
        <input type="date" id="toDate" class="border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-sm text-slate-800">
      </div>
      <button onclick="applyFilter()" class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2.5 rounded-xl font-semibold transition text-sm">Apply</button>
      <button onclick="resetFilter()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-6 py-2.5 rounded-xl font-semibold transition text-sm">Reset</button>
    </div>
  </div>

  <!-- Cards -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-5 mb-6">
    <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col items-center text-center">
      <div class="w-11 h-11 bg-emerald-100 rounded-xl flex items-center justify-center mb-3">
        <i class="fas fa-arrow-up text-emerald-600 text-lg"></i>
      </div>
      <h3 class="text-slate-500 text-xs font-semibold uppercase tracking-wide mb-2">Outward Supplies (Sales)</h3>
      <p id="totalSales" class="text-3xl font-bold text-slate-800">₹ 0</p>
    </div>
    <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col items-center text-center">
      <div class="w-11 h-11 bg-amber-100 rounded-xl flex items-center justify-center mb-3">
        <i class="fas fa-arrow-down text-amber-600 text-lg"></i>
      </div>
      <h3 class="text-slate-500 text-xs font-semibold uppercase tracking-wide mb-2">Inward Supplies (Purchase)</h3>
      <p id="totalPurchase" class="text-3xl font-bold text-slate-800">₹ 0</p>
    </div>
    <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col items-center text-center">
      <div class="w-11 h-11 bg-rose-100 rounded-xl flex items-center justify-center mb-3">
        <i class="fas fa-percent text-rose-600 text-lg"></i>
      </div>
      <h3 class="text-slate-500 text-xs font-semibold uppercase tracking-wide mb-2">Net GST Payable</h3>
      <p id="netGST" class="text-3xl font-bold text-slate-800">₹ 0</p>
    </div>
  </div>

  <div class="bg-amber-50 border border-amber-200 rounded-xl p-4">
    <p class="text-amber-700 text-xs flex items-center gap-2">
      <i class="fas fa-circle-info text-amber-500"></i>
      Simplified GSTR-3B view. Actual filing includes ITC, reverse charge, and other components.
    </p>
  </div>
</div>

<script src="/src/api/client.js"></script>
<script src="/src/api/sales.api.js"></script>
<script src="/src/api/purchases.api.js"></script>
<script src="/src/utils/formatters.js"></script>
<script src="/src/components/sidebar.js"></script>
<script>
checkAuth();
function setDefaultDates() {
  document.getElementById('fromDate').value = Formatters.daysAgo(30);
  document.getElementById('toDate').value = Formatters.today();
}
async function applyFilter() {
  const from = new Date(document.getElementById('fromDate').value || '2000-01-01');
  const to = new Date(document.getElementById('toDate').value || new Date()); to.setHours(23,59,59);
  const [sales, purchases] = await Promise.all([SalesAPI.getByDateRange(from,to), PurchasesAPI.getByDateRange(from,to)]);
  const salesTotal = sales.reduce((s,r)=>s+(r.grandTotal||0),0);
  const purchaseTotal = purchases.reduce((s,r)=>s+(r.grandTotal||0),0);
  const net = Math.round(salesTotal * 0.05) - Math.round(purchaseTotal * 0.05);
  document.getElementById('totalSales').textContent = Formatters.currency(salesTotal);
  document.getElementById('totalPurchase').textContent = Formatters.currency(purchaseTotal);
  document.getElementById('netGST').textContent = Formatters.currency(net);
}
function resetFilter() { setDefaultDates(); applyFilter(); }
setDefaultDates(); applyFilter();
</script>
</body>
</html>
