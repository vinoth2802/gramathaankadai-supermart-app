<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daily Sales Summary - SuperMart</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head><body class="bg-slate-50 min-h-screen">
<div id="sidebar-container"></div>
<div class="ml-64 min-h-screen p-8">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">Daily Sales Summary</h1>
      <p class="text-slate-500 text-sm mt-0.5">Day-by-day breakdown of sales performance</p>
    </div>
    <div id="user-info"></div>
  </div>

  <!-- Filter bar -->
  <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
    <div class="flex flex-wrap gap-4 items-end">
      <div>
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">From Date</label>
        <input type="date" id="fromDate" class="border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-sm text-slate-800">
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">To Date</label>
        <input type="date" id="toDate" class="border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-sm text-slate-800">
      </div>
      <button onclick="applyFilter()" class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2.5 rounded-xl font-semibold transition text-sm">Apply</button>
      <button onclick="exportDailySummary()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl font-semibold transition text-sm flex items-center gap-2">
        <i class="fas fa-download"></i> Export CSV
      </button>
    </div>
  </div>

  <!-- Total card -->
  <div class="bg-gradient-to-r from-emerald-500 to-emerald-600 rounded-xl p-6 text-white text-center mb-6 shadow-md shadow-emerald-200">
    <p class="text-emerald-100 text-sm font-semibold uppercase tracking-wide mb-1">Total Sales in Period</p>
    <p id="periodTotal" class="text-4xl font-bold">₹ 0</p>
  </div>

  <!-- Table -->
  <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-slate-200">
    <table class="w-full text-sm">
      <thead class="bg-slate-800 text-white">
        <tr>
          <th class="px-5 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Date</th>
          <th class="px-5 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">No. of Bills</th>
          <th class="px-5 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Total Sales</th>
          <th class="px-5 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Average Bill</th>
        </tr>
      </thead>
      <tbody id="dailyTable" class="divide-y divide-slate-100"></tbody>
    </table>
  </div>
</div>

<script src="/src/api/client.js"></script><script src="/src/api/sales.api.js"></script>
<script src="/src/utils/formatters.js"></script><script src="/src/components/sidebar.js"></script>
<script>
checkAuth();
logAudit('DAILY_SALES_SUMMARY_OPENED',{});
function setDefaultDates(){document.getElementById('fromDate').value=Formatters.daysAgo(30);document.getElementById('toDate').value=Formatters.today();}
function groupByDate(sales){const g={};sales.forEach(s=>{const k=s.date.split(',')[0];if(!g[k])g[k]=[];g[k].push(s);});return g;}
async function applyFilter(){
  const from=new Date(document.getElementById('fromDate').value||'2000-01-01');
  const to=new Date(document.getElementById('toDate').value||new Date());to.setHours(23,59,59);
  const sales=await SalesAPI.getByDateRange(from,to);
  const grouped=groupByDate(sales);
  let grand=0;
  document.getElementById('dailyTable').innerHTML=Object.keys(grouped).sort().reverse().map(date=>{
    const day=grouped[date];const total=day.reduce((s,r)=>s+(r.grandTotal||0),0);
    const bills=day.length;grand+=total;
    return `<tr class="hover:bg-slate-50 transition-colors">
      <td class="px-5 py-3.5 font-medium text-slate-800">${date}</td>
      <td class="px-5 py-3.5 text-slate-600">${bills}</td>
      <td class="px-5 py-3.5 font-semibold text-emerald-600">${Formatters.currency(total)}</td>
      <td class="px-5 py-3.5 text-slate-500">${Formatters.currency(bills>0?total/bills:0)}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="4" class="px-5 py-12 text-center text-slate-400">No sales data in this range.</td></tr>';
  document.getElementById('periodTotal').textContent=Formatters.currency(grand);
}
async function exportDailySummary(){
  const from=new Date(document.getElementById('fromDate').value||'2000-01-01');
  const to=new Date(document.getElementById('toDate').value||new Date());to.setHours(23,59,59);
  const sales=await SalesAPI.getByDateRange(from,to);
  const grouped=groupByDate(sales);
  let csv="Date,No of Bills,Total Sales,Average Bill\n";
  Object.keys(grouped).sort().reverse().forEach(date=>{
    const day=grouped[date];const total=day.reduce((s,r)=>s+(r.grandTotal||0),0);
    const bills=day.length;
    csv+=`"${date}",${bills},${total.toFixed(2)},${bills>0?(total/bills).toFixed(2):0}\n`;
  });
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=`Daily_Sales_${Formatters.today()}.csv`;a.click();
}
setDefaultDates();applyFilter();
</script></body></html>
