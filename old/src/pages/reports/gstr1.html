<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GSTR-1 Report - SuperMart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">
<div id="sidebar-container"></div>
<div class="ml-64 min-h-screen p-8">

  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">GSTR-1 Report</h1>
      <p class="text-slate-500 text-sm mt-0.5">Outward supplies summary for GST filing</p>
    </div>
    <div id="user-info"></div>
  </div>

  <!-- Filter -->
  <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
    <div class="flex flex-wrap gap-4 items-end">
      <div>
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">From Date</label>
        <input type="date" id="fromDate" class="border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-sm text-slate-800">
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">To Date</label>
        <input type="date" id="toDate" class="border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-sm text-slate-800">
      </div>
      <button onclick="applyFilter()" class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2.5 rounded-xl font-semibold transition text-sm">Apply</button>
      <button onclick="resetFilter()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-6 py-2.5 rounded-xl font-semibold transition text-sm">Reset</button>
    </div>
  </div>

  <!-- Total card -->
  <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-200 text-center mb-6">
    <p class="text-slate-500 text-xs font-semibold uppercase tracking-wide mb-1">Total Taxable Value + GST (Sales)</p>
    <p id="gstr1Total" class="text-4xl font-bold text-slate-800">₹ 0</p>
  </div>

  <!-- Table -->
  <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-slate-800 text-white">
        <tr>
          <th class="px-4 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Date</th>
          <th class="px-4 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Invoice</th>
          <th class="px-4 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Customer</th>
          <th class="px-4 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Taxable</th>
          <th class="px-4 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">GST 5%</th>
          <th class="px-4 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Total</th>
        </tr>
      </thead>
      <tbody id="gstr1Table" class="divide-y divide-slate-100"></tbody>
    </table>
  </div>
</div>

<script src="/src/api/client.js"></script>
<script src="/src/api/sales.api.js"></script>
<script src="/src/utils/formatters.js"></script>
<script src="/src/components/sidebar.js"></script>
<script>
checkAuth();
function setDefaultDates() {
  document.getElementById('fromDate').value = Formatters.daysAgo(30);
  document.getElementById('toDate').value = Formatters.today();
}
async function applyFilter() {
  const from = new Date(document.getElementById('fromDate').value || '2000-01-01');
  const to = new Date(document.getElementById('toDate').value || new Date()); to.setHours(23,59,59);
  const sales = await SalesAPI.getByDateRange(from, to);
  let taxableTotal = 0, gstTotal = 0;
  const tbody = document.getElementById('gstr1Table');
  tbody.innerHTML = sales.map(s => {
    const grand = s.grandTotal || 0;
    const gst = Math.round(grand * 0.05);
    const taxable = grand - gst;
    taxableTotal += taxable; gstTotal += gst;
    return `<tr class="hover:bg-slate-50 transition-colors">
      <td class="px-4 py-3 text-slate-400 text-xs font-mono">${s.date}</td>
      <td class="px-4 py-3 font-semibold text-slate-800 font-mono text-xs">${s.invoice}</td>
      <td class="px-4 py-3 text-slate-600">${s.customerName||'Walk-in'}</td>
      <td class="px-4 py-3 text-slate-700">${Formatters.currency(taxable)}</td>
      <td class="px-4 py-3 text-amber-600 font-medium">${Formatters.currency(gst)}</td>
      <td class="px-4 py-3 font-bold text-emerald-600">${Formatters.currency(grand)}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="6" class="px-4 py-12 text-center text-slate-400">No sales in this period.</td></tr>';
  document.getElementById('gstr1Total').textContent = Formatters.currency(taxableTotal + gstTotal);
}
function resetFilter() { setDefaultDates(); applyFilter(); }
setDefaultDates(); applyFilter();
</script>
</body>
</html>
