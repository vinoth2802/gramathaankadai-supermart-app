<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Summary Report - SuperMart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">
<div id="sidebar-container"></div>
<div class="ml-64 min-h-screen p-8">

  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">Summary Report</h1>
      <p class="text-slate-500 text-sm mt-0.5">Financial overview across a date range</p>
    </div>
    <div id="user-info"></div>
  </div>

  <!-- Filter -->
  <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-6">
    <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-4">Date Range Filter</h2>
    <div class="flex flex-wrap gap-4 items-end">
      <div>
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">From Date</label>
        <input type="date" id="fromDate" class="border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-sm text-slate-800">
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">To Date</label>
        <input type="date" id="toDate" class="border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-sm text-slate-800">
      </div>
      <button onclick="applyFilter()" class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2.5 rounded-xl font-semibold transition text-sm">Apply</button>
      <button onclick="resetFilter()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-6 py-2.5 rounded-xl font-semibold transition text-sm">Reset</button>
    </div>
  </div>

  <!-- Stat cards -->
  <div class="grid grid-cols-2 lg:grid-cols-4 gap-5">
    <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col items-center text-center">
      <div class="w-11 h-11 bg-emerald-100 rounded-xl flex items-center justify-center mb-3">
        <i class="fas fa-chart-line text-emerald-600 text-lg"></i>
      </div>
      <p class="text-slate-500 text-xs font-semibold uppercase tracking-wide mb-1">Total Sales</p>
      <p id="total-sales" class="text-3xl font-bold text-slate-800">₹ 0</p>
    </div>
    <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col items-center text-center">
      <div class="w-11 h-11 bg-amber-100 rounded-xl flex items-center justify-center mb-3">
        <i class="fas fa-truck text-amber-600 text-lg"></i>
      </div>
      <p class="text-slate-500 text-xs font-semibold uppercase tracking-wide mb-1">Total Purchase</p>
      <p id="total-purchase" class="text-3xl font-bold text-slate-800">₹ 0</p>
    </div>
    <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col items-center text-center">
      <div class="w-11 h-11 bg-blue-100 rounded-xl flex items-center justify-center mb-3">
        <i class="fas fa-arrow-down text-blue-600 text-lg"></i>
      </div>
      <p class="text-slate-500 text-xs font-semibold uppercase tracking-wide mb-1">Receivable</p>
      <p id="total-receivable" class="text-3xl font-bold text-slate-800">₹ 0</p>
    </div>
    <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col items-center text-center">
      <div class="w-11 h-11 bg-orange-100 rounded-xl flex items-center justify-center mb-3">
        <i class="fas fa-arrow-up text-orange-600 text-lg"></i>
      </div>
      <p class="text-slate-500 text-xs font-semibold uppercase tracking-wide mb-1">Payable</p>
      <p id="total-payable" class="text-3xl font-bold text-slate-800">₹ 0</p>
    </div>
  </div>
</div>

<script src="/src/api/client.js"></script>
<script src="/src/api/sales.api.js"></script>
<script src="/src/api/purchases.api.js"></script>
<script src="/src/api/parties.api.js"></script>
<script src="/src/utils/formatters.js"></script>
<script src="/src/components/sidebar.js"></script>
<script>
checkAuth();
function setDefaultDates() {
  document.getElementById('fromDate').value = Formatters.daysAgo(30);
  document.getElementById('toDate').value = Formatters.today();
}
async function applyFilter() {
  const from = new Date(document.getElementById('fromDate').value || '2000-01-01');
  const to = new Date(document.getElementById('toDate').value || new Date()); to.setHours(23,59,59);
  const [sales, purchases, parties] = await Promise.all([SalesAPI.getByDateRange(from,to), PurchasesAPI.getByDateRange(from,to), PartiesAPI.getAll()]);
  document.getElementById('total-sales').textContent = Formatters.currency(sales.reduce((s,r)=>s+(r.grandTotal||0),0));
  document.getElementById('total-purchase').textContent = Formatters.currency(purchases.reduce((s,r)=>s+(r.grandTotal||0),0));
  document.getElementById('total-receivable').textContent = Formatters.currency(parties.reduce((s,p)=>s+Math.max(p.balance||0,0),0));
  document.getElementById('total-payable').textContent = Formatters.currency(parties.reduce((s,p)=>s+Math.max(p.payable||0,0),0));
}
function resetFilter() { setDefaultDates(); applyFilter(); }
setDefaultDates(); applyFilter();
</script>
</body>
</html>
