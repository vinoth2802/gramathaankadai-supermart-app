<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sales History - SuperMart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">

  <div id="sidebar-container"></div>

  <div class="ml-64 min-h-screen p-8">

    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold text-slate-800">Sales History</h1>
        <p class="text-slate-500 text-sm mt-0.5">View all completed sales transactions</p>
      </div>
      <div id="user-info"></div>
    </div>

    <!-- Search -->
    <div class="mb-5 relative max-w-md">
      <i class="fas fa-search absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
      <input type="text" id="salesSearch" placeholder="Search by invoice or customer..."
             oninput="filterSales()"
             class="border border-slate-300 rounded-xl pl-10 pr-4 py-2.5 w-full focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-sm text-slate-800 placeholder-slate-400 bg-white">
    </div>

    <!-- Records list -->
    <div id="salesHistoryList" class="space-y-3"></div>

  </div>

  <script src="../../api/client.js"></script>
  <script src="../../api/sales.api.js"></script>
  <script src="../../utils/formatters.js"></script>
  <script src="../../components/sidebar.js"></script>
  <script src="sales-history.js"></script>
</body>
</html>
