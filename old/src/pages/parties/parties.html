<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Parties - SuperMart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">

  <div id="sidebar-container"></div>

  <div class="ml-64 min-h-screen p-8">

    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold text-slate-800">Party Management</h1>
        <p class="text-slate-500 text-sm mt-0.5">Manage customers and suppliers</p>
      </div>
      <div id="user-info"></div>
    </div>

    <!-- Toolbar -->
    <div class="flex flex-wrap gap-3 mb-6">
      <button onclick="showAddModal()"
              class="bg-amber-500 hover:bg-amber-600 text-white px-5 py-2.5 rounded-xl font-semibold transition text-sm flex items-center gap-2 shadow-sm">
        <i class="fas fa-plus"></i> Add New Party
      </button>
      <input type="text" id="searchParty" placeholder="Search by name or phone..."
             oninput="filterParties()"
             class="border border-slate-300 rounded-xl px-4 py-2.5 w-72 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-sm text-slate-800 placeholder-slate-400">
    </div>

    <!-- Table -->
    <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-slate-200">
      <table class="w-full text-sm">
        <thead class="bg-slate-800 text-white">
          <tr>
            <th class="px-5 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Name</th>
            <th class="px-5 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Phone</th>
            <th class="px-5 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Receivable</th>
            <th class="px-5 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Payable</th>
            <th class="px-5 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Type</th>
            <th class="px-5 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Last Sale</th>
            <th class="px-5 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Actions</th>
          </tr>
        </thead>
        <tbody id="partiesBody" class="divide-y divide-slate-100"></tbody>
      </table>
    </div>
  </div>

  <!-- Add / Edit Modal -->
  <div id="partyModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-8 max-h-[92vh] overflow-y-auto">
      <div class="flex items-center justify-between mb-6">
        <h2 id="modalTitle" class="text-xl font-bold text-slate-800">Add New Party</h2>
        <button onclick="hideModal()" class="text-slate-400 hover:text-slate-600 transition"><i class="fas fa-times text-lg"></i></button>
      </div>

      <form id="partyForm">
        <input type="hidden" id="editId">

        <div class="mb-4">
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Party Name *</label>
          <input type="text" id="custName" required placeholder="Full name"
                 class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-sm text-slate-800">
        </div>

        <div class="mb-4">
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Phone Number</label>
          <input type="tel" id="custPhone" placeholder="10-digit mobile"
                 class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-sm text-slate-800">
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Balance (Receivable)</label>
            <input type="number" id="custBalance" value="0"
                   class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 text-sm text-slate-800">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Payable (You owe)</label>
            <input type="number" id="custPayable" value="0"
                   class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 text-sm text-slate-800">
          </div>
        </div>

        <div class="mb-4">
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Party Type</label>
          <select id="custType"
                  class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 text-sm text-slate-800">
            <option value="customer">Customer</option>
            <option value="supplier">Supplier</option>
            <option value="both">Both (Customer + Supplier)</option>
          </select>
        </div>

        <div class="mb-7">
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Notes / Address / GSTIN</label>
          <textarea id="custNotes" rows="2" placeholder="Optional..."
                    class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 resize-none text-sm text-slate-800"></textarea>
        </div>

        <div class="flex gap-3">
          <button type="submit"
                  class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-xl transition shadow-sm text-sm">
            <i class="fas fa-save mr-2"></i>Save Party
          </button>
          <button type="button" onclick="hideModal()"
                  class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-3 rounded-xl transition text-sm">
            Cancel
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="../../api/client.js"></script>
  <script src="../../api/parties.api.js"></script>
  <script src="../../utils/formatters.js"></script>
  <script src="../../components/sidebar.js"></script>
  <script src="parties.js"></script>
</body>
</html>
