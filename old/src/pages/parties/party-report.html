<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Party Report - SuperMart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">

  <div id="sidebar-container"></div>

  <div class="ml-64 min-h-screen p-8">

    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold text-slate-800">Party Report</h1>
        <p class="text-slate-500 text-sm mt-0.5">Receivables, payables, and net position by party</p>
      </div>
      <div id="user-info"></div>
    </div>

    <!-- Summary Cards -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-5 mb-6">
      <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
        <div class="flex items-center gap-3 mb-3">
          <div class="w-9 h-9 bg-slate-100 rounded-xl flex items-center justify-center">
            <i class="fas fa-users text-slate-600 text-sm"></i>
          </div>
          <p class="text-slate-500 text-xs font-semibold uppercase tracking-wide">Total Parties</p>
        </div>
        <p id="totalParties" class="text-3xl font-bold text-slate-800">0</p>
      </div>
      <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
        <div class="flex items-center gap-3 mb-3">
          <div class="w-9 h-9 bg-emerald-100 rounded-xl flex items-center justify-center">
            <i class="fas fa-arrow-down text-emerald-600 text-sm"></i>
          </div>
          <p class="text-slate-500 text-xs font-semibold uppercase tracking-wide">Receivable</p>
        </div>
        <p id="totalReceivable" class="text-3xl font-bold text-emerald-600">₹ 0</p>
      </div>
      <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
        <div class="flex items-center gap-3 mb-3">
          <div class="w-9 h-9 bg-rose-100 rounded-xl flex items-center justify-center">
            <i class="fas fa-arrow-up text-rose-600 text-sm"></i>
          </div>
          <p class="text-slate-500 text-xs font-semibold uppercase tracking-wide">Payable</p>
        </div>
        <p id="totalPayable" class="text-3xl font-bold text-rose-600">₹ 0</p>
      </div>
      <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
        <div class="flex items-center gap-3 mb-3">
          <div class="w-9 h-9 bg-amber-100 rounded-xl flex items-center justify-center">
            <i class="fas fa-scale-balanced text-amber-600 text-sm"></i>
          </div>
          <p class="text-slate-500 text-xs font-semibold uppercase tracking-wide">Net Position</p>
        </div>
        <p id="netPosition" class="text-3xl font-bold text-amber-600">₹ 0</p>
      </div>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-slate-200">
      <table class="w-full text-sm">
        <thead class="bg-slate-800 text-white">
          <tr>
            <th class="px-5 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Party Name</th>
            <th class="px-5 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Phone</th>
            <th class="px-5 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Type</th>
            <th class="px-5 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Receivable</th>
            <th class="px-5 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Payable</th>
            <th class="px-5 py-3.5 text-left font-semibold text-xs uppercase tracking-wide">Net</th>
          </tr>
        </thead>
        <tbody id="partyReportBody" class="divide-y divide-slate-100"></tbody>
      </table>
    </div>

  </div>

  <script src="../../api/client.js"></script>
  <script src="../../api/parties.api.js"></script>
  <script src="../../utils/formatters.js"></script>
  <script src="../../components/sidebar.js"></script>
  <script src="party-report.js"></script>
</body>
</html>
