<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Out - SuperMart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="sidebar-container"></div>
  <div class="ml-64 min-h-screen p-8">
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold text-slate-800">Payment Out</h1>
        <p class="text-slate-500 text-sm mt-0.5">Record payments made to parties</p>
      </div>
      <div id="user-info"></div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 max-w-lg mb-8">
      <div class="flex items-center gap-3 mb-6 pb-5 border-b border-slate-100">
        <div class="w-10 h-10 bg-rose-100 rounded-xl flex items-center justify-center">
          <i class="fas fa-arrow-up text-rose-600"></i>
        </div>
        <div>
          <h2 class="font-semibold text-slate-800">Make Payment</h2>
          <p class="text-slate-400 text-xs mt-0.5">Amount paid to a supplier or party</p>
        </div>
      </div>
      <div class="mb-4">
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Select Party</label>
        <select id="partySelect" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-sm text-slate-800">
          <option value="">-- Select Party --</option>
        </select>
      </div>
      <div class="mb-4">
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Amount Paid (₹)</label>
        <input type="number" id="paymentAmount" placeholder="Enter amount"
               class="w-full border border-slate-300 rounded-xl px-4 py-3 text-xl font-bold focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-slate-800">
      </div>
      <div class="mb-4">
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Payment Mode</label>
        <select id="paymentMode" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-sm text-slate-800"></select>
      </div>
      <div class="mb-6">
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Remarks / Reference</label>
        <textarea id="remarks" rows="2" placeholder="Optional: Transaction ID, Cheque No, etc."
                  class="w-full border border-slate-300 rounded-xl px-4 py-2.5 resize-none focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 text-sm text-slate-800"></textarea>
      </div>
      <button onclick="savePaymentOut()"
              class="w-full bg-rose-600 hover:bg-rose-700 text-white font-bold py-3 rounded-xl transition shadow-sm text-sm flex items-center justify-center gap-2">
        <i class="fas fa-check"></i> Save Payment Out
      </button>
    </div>

    <div class="max-w-lg">
      <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-4">Recent Payment Out History</h2>
      <div id="paymentOutHistory" class="space-y-3"></div>
    </div>
  </div>

  <script src="../../api/client.js"></script>
  <script src="../../api/parties.api.js"></script>
  <script src="../../api/payments.api.js"></script>
  <script src="../../utils/formatters.js"></script>
  <script src="../../components/sidebar.js"></script>
  <script>
    checkAuth();

    async function init() {
      const [parties, modes] = await Promise.all([PartiesAPI.getAll(), PaymentsAPI.getModes()]);
      parties.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = `${p.name}${p.phone ? ' (' + p.phone + ')' : ''} [${p.type.toUpperCase()}]`;
        document.getElementById('partySelect').appendChild(opt);
      });
      modes.forEach(m => {
        const opt = document.createElement('option');
        opt.value = opt.textContent = m.name;
        document.getElementById('paymentMode').appendChild(opt);
      });
      renderHistory();
    }

    async function savePaymentOut() {
      const partyId = document.getElementById('partySelect').value;
      const amount  = Number(document.getElementById('paymentAmount').value);
      const mode    = document.getElementById('paymentMode').value || 'Cash';
      const remarks = document.getElementById('remarks').value.trim();
      if (!partyId || amount <= 0) return alert('Please select party and enter a valid amount');

      await PartiesAPI.updateBalance(partyId, -amount, 'payable');
      const party = await PartiesAPI.getById(partyId);
      await PaymentsAPI.savePaymentOut({
        date: new Date().toLocaleString('en-IN'),
        partyId, partyName: party ? party.name : '—',
        amount, mode, remarks: remarks || 'Payment made to party'
      });
      logAudit('PAYMENT_OUT_SAVED', { party: party ? party.name : partyId, amount });
      alert(`Payment Out of ${Formatters.currency(amount)} recorded!`);
      document.getElementById('paymentAmount').value = '';
      document.getElementById('remarks').value = '';
      renderHistory();
    }

    async function renderHistory() {
      const history   = await PaymentsAPI.getPaymentsOut();
      const container = document.getElementById('paymentOutHistory');
      container.innerHTML = history.length === 0
        ? `<p class="text-center text-slate-400 py-8 text-sm">No payment records yet.</p>`
        : history.map(r => `
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 border-l-4 border-l-rose-500 px-5 py-4">
              <div class="flex justify-between items-start">
                <div>
                  <span class="font-bold text-rose-600 text-lg">- ${Formatters.currency(r.amount)}</span>
                  <span class="text-slate-500 text-sm ml-2">to <strong class="text-slate-700">${r.partyName}</strong></span>
                </div>
                <span class="text-xs text-slate-400">${r.date}</span>
              </div>
              <p class="text-slate-400 text-xs mt-1">${r.mode}${r.remarks ? ' &bull; ' + r.remarks : ''}</p>
            </div>`).join('');
    }

    init();
  </script>
</body>
</html>
