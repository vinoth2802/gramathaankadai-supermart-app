<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Import Parties - SuperMart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">
<div id="sidebar-container"></div>
<div class="ml-64 min-h-screen p-8">

  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">Import Parties</h1>
      <p class="text-slate-500 text-sm mt-0.5">Bulk upload customers and suppliers from a CSV file</p>
    </div>
    <div id="user-info"></div>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8 max-w-3xl">

    <!-- Section header -->
    <div class="flex items-center gap-3 mb-5">
      <div class="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center">
        <i class="fas fa-users text-blue-600"></i>
      </div>
      <div>
        <h2 class="text-base font-bold text-slate-800">Import Parties from CSV</h2>
        <p class="text-slate-400 text-xs mt-0.5">Columns: Name, Phone, Type (customer/supplier/both), Balance, Payable, Notes</p>
      </div>
    </div>

    <!-- Drop zone -->
    <div class="border-2 border-dashed border-blue-200 rounded-xl p-12 text-center bg-blue-50 mb-6">
      <div class="w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-cloud-upload-alt text-blue-500 text-2xl"></i>
      </div>
      <h3 class="font-bold text-slate-700 mb-1">Drag & Drop your CSV file here</h3>
      <p class="text-slate-400 text-sm mb-5">or browse from your computer</p>
      <input type="file" id="fileInput" accept=".csv" class="hidden">
      <button onclick="document.getElementById('fileInput').click()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl font-semibold transition text-sm flex items-center gap-2 mx-auto">
        <i class="fas fa-folder-open"></i> Select CSV File
      </button>
    </div>

    <!-- Preview -->
    <div id="previewSection" class="hidden">
      <div class="flex items-center gap-2 mb-3">
        <i class="fas fa-eye text-slate-400 text-sm"></i>
        <h3 class="font-bold text-slate-700 text-sm uppercase tracking-wide">Preview Parties to Import</h3>
      </div>
      <div class="overflow-x-auto max-h-80 overflow-y-auto border border-slate-200 rounded-xl mb-4">
        <table class="w-full text-sm">
          <thead class="bg-slate-800 text-white">
            <tr>
              <th class="px-3 py-2.5 text-left font-semibold text-xs uppercase tracking-wide">Name</th>
              <th class="px-3 py-2.5 text-left font-semibold text-xs uppercase tracking-wide">Phone</th>
              <th class="px-3 py-2.5 text-left font-semibold text-xs uppercase tracking-wide">Type</th>
              <th class="px-3 py-2.5 text-left font-semibold text-xs uppercase tracking-wide">Balance</th>
              <th class="px-3 py-2.5 text-left font-semibold text-xs uppercase tracking-wide">Payable</th>
            </tr>
          </thead>
          <tbody id="previewBody" class="divide-y divide-slate-100"></tbody>
        </table>
      </div>
      <div class="flex gap-3 justify-end">
        <button onclick="clearPreview()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-5 py-2.5 rounded-xl font-semibold text-sm transition">Cancel</button>
        <button onclick="importNow()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl font-semibold text-sm transition flex items-center gap-2">
          <i class="fas fa-check"></i> Import All Parties
        </button>
      </div>
    </div>

  </div>
</div>
<script src="/src/api/client.js"></script>
<script src="/src/api/parties.api.js"></script>
<script src="/src/utils/formatters.js"></script>
<script src="/src/components/sidebar.js"></script>
<script>
checkAuth(); logAudit('IMPORT_PARTIES_PAGE_OPENED',{});
let importedParties=[];
document.getElementById('fileInput').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();reader.onload=ev=>parseCSV(ev.target.result);reader.readAsText(file);
});
function parseCSV(text){
  const rows=text.trim().split('\n');importedParties=[];
  for(let i=1;i<rows.length;i++){
    if(!rows[i].trim())continue;const c=rows[i].split(',');
    importedParties.push({name:c[0]||'',phone:c[1]||'',type:(c[2]||'customer').toLowerCase(),balance:parseFloat(c[3])||0,payable:parseFloat(c[4])||0,notes:c[5]||''});
  }
  document.getElementById('previewSection').classList.remove('hidden');
  document.getElementById('previewBody').innerHTML=importedParties.map(p=>`
    <tr class="hover:bg-slate-50 transition-colors">
      <td class="px-3 py-2.5 font-medium text-slate-800">${p.name}</td>
      <td class="px-3 py-2.5 text-slate-500">${p.phone||'—'}</td>
      <td class="px-3 py-2.5"><span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-blue-100 text-blue-700">${p.type.toUpperCase()}</span></td>
      <td class="px-3 py-2.5 text-emerald-600 font-medium">${Formatters.currency(p.balance)}</td>
      <td class="px-3 py-2.5 text-rose-600 font-medium">${Formatters.currency(p.payable)}</td>
    </tr>`).join('');
}
function clearPreview(){document.getElementById('previewSection').classList.add('hidden');importedParties=[];document.getElementById('fileInput').value='';}
async function importNow(){
  if(!importedParties.length) return alert('No parties to import!');
  for(const p of importedParties){
    await PartiesAPI.create({name:p.name,phone:p.phone,type:p.type,balance:p.balance,payable:p.payable,notes:p.notes,lastSale:''});
  }
  logAudit('PARTIES_IMPORTED',{count:importedParties.length});
  alert(`Successfully imported ${importedParties.length} parties!`);
  clearPreview();
}
</script>
</body>
</html>
