<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Export Parties - SuperMart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">
<div id="sidebar-container"></div>
<div class="ml-64 min-h-screen p-8">

  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">Export Parties</h1>
      <p class="text-slate-500 text-sm mt-0.5">Download your complete party list as a CSV file</p>
    </div>
    <div id="user-info"></div>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8 max-w-2xl">

    <!-- Section header -->
    <div class="flex items-center gap-3 mb-6">
      <div class="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center">
        <i class="fas fa-users text-blue-600"></i>
      </div>
      <div>
        <h2 class="text-base font-bold text-slate-800">Export All Parties to CSV</h2>
        <p class="text-slate-400 text-xs mt-0.5">Compatible with the Import Parties page</p>
      </div>
    </div>

    <!-- Stats + download -->
    <div class="border-2 border-dashed border-blue-200 rounded-xl p-8 bg-blue-50 text-center mb-6">
      <div class="w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center mx-auto mb-5">
        <i class="fas fa-user-friends text-blue-600 text-2xl"></i>
      </div>

      <!-- Breakdown -->
      <div class="flex justify-center gap-8 mb-5">
        <div class="text-center">
          <p class="text-xs text-slate-500 font-semibold uppercase tracking-wide mb-1">Customers</p>
          <p id="customerCount" class="text-2xl font-bold text-emerald-600">0</p>
        </div>
        <div class="w-px bg-slate-200"></div>
        <div class="text-center">
          <p class="text-xs text-slate-500 font-semibold uppercase tracking-wide mb-1">Suppliers</p>
          <p id="supplierCount" class="text-2xl font-bold text-amber-600">0</p>
        </div>
        <div class="w-px bg-slate-200"></div>
        <div class="text-center">
          <p class="text-xs text-slate-500 font-semibold uppercase tracking-wide mb-1">Both</p>
          <p id="bothCount" class="text-2xl font-bold text-blue-600">0</p>
        </div>
      </div>

      <p class="text-slate-500 text-sm mb-1">Total Parties</p>
      <p id="partyCount" class="text-4xl font-bold text-slate-800 mb-5">0</p>

      <button onclick="exportParties()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold transition flex items-center gap-2 mx-auto">
        <i class="fas fa-download"></i> Download Parties CSV
      </button>
      <p class="text-slate-400 text-xs mt-3">Includes: Name, Phone, Type, Balance, Payable, Notes</p>
    </div>

    <div class="bg-blue-50 border border-blue-200 rounded-xl p-3">
      <p class="text-blue-700 text-xs flex items-center gap-2">
        <i class="fas fa-circle-info text-blue-500"></i>
        This file is compatible with the Import Parties feature.
      </p>
    </div>

  </div>
</div>
<script src="/src/api/client.js"></script>
<script src="/src/api/parties.api.js"></script>
<script src="/src/utils/formatters.js"></script>
<script src="/src/components/sidebar.js"></script>
<script>
checkAuth(); logAudit('EXPORT_PARTIES_PAGE_OPENED',{});
async function init(){
  const parties=await PartiesAPI.getAll();
  document.getElementById('partyCount').textContent=parties.length;
  document.getElementById('customerCount').textContent=parties.filter(p=>p.type==='customer').length;
  document.getElementById('supplierCount').textContent=parties.filter(p=>p.type==='supplier').length;
  document.getElementById('bothCount').textContent=parties.filter(p=>p.type==='both').length;
}
async function exportParties(){
  const parties=await PartiesAPI.getAll();
  if(!parties.length) return alert('No parties found to export!');
  let csv="Name,Phone,Type,Balance,Payable,Notes\n";
  parties.forEach(p=>{ csv+=`"${p.name||''}","${p.phone||''}","${p.type||'customer'}",${p.balance||0},${p.payable||0},"${p.notes||''}"\n`; });
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=`SuperMart_Parties_${new Date().toISOString().slice(0,10)}.csv`;a.click();
  logAudit('PARTIES_EXPORTED',{count:parties.length});
  alert(`Exported ${parties.length} parties!`);
}
init();
</script>
</body>
</html>
