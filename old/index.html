<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SuperMart - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="min-h-screen bg-slate-900 flex items-center justify-center px-4">

  <!-- Background decorative elements -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -right-40 w-96 h-96 bg-amber-500/10 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-amber-600/5 rounded-full blur-3xl"></div>
  </div>

  <div class="relative w-full max-w-md">

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">

      <!-- Top brand bar -->
      <div class="bg-gradient-to-r from-amber-500 to-amber-600 px-10 py-8 text-center">
        <div class="inline-flex items-center justify-center w-14 h-14 bg-white/20 rounded-2xl mb-4 backdrop-blur-sm">
          <i class="fas fa-store text-white text-2xl"></i>
        </div>
        <h1 class="text-white text-2xl font-bold tracking-wide">SuperMart</h1>
        <p class="text-amber-100 text-sm mt-1">Gramathaankadai Management System</p>
      </div>

      <!-- Form -->
      <div class="px-10 py-8">
        <h2 class="text-slate-700 text-lg font-semibold mb-6">Sign in to your account</h2>

        <form id="loginForm">
          <div class="mb-5">
            <label class="block text-sm font-semibold text-slate-600 mb-2">
              <i class="fas fa-user mr-1.5 text-slate-400"></i>Username
            </label>
            <input type="text" id="username" value="admin" required
                   class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 transition text-slate-800 bg-slate-50">
          </div>
          <div class="mb-7">
            <label class="block text-sm font-semibold text-slate-600 mb-2">
              <i class="fas fa-lock mr-1.5 text-slate-400"></i>Password
            </label>
            <input type="password" id="password" value="1234" required
                   class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 transition text-slate-800 bg-slate-50">
          </div>
          <button type="submit"
                  class="w-full bg-amber-500 hover:bg-amber-600 active:bg-amber-700 text-white font-bold py-3.5 rounded-xl transition shadow-md shadow-amber-200 hover:shadow-amber-300 flex items-center justify-center gap-2">
            <i class="fas fa-right-to-bracket text-lg"></i>
            Sign In
          </button>
        </form>

        <p class="text-center text-slate-400 text-xs mt-6 flex items-center justify-center gap-1.5">
          <i class="fas fa-circle-info"></i>
          Demo credentials: <span class="font-semibold text-slate-500">admin / 1234</span>
        </p>
      </div>
    </div>

    <!-- Footer -->
    <p class="text-center text-slate-600 text-xs mt-5">
      &copy; 2024 SuperMart · Gramathaankadai
    </p>
  </div>

  <script src="src/api/client.js"></script>
  <script>
    if (Auth.isLoggedIn()) {
      window.location.replace('/src/pages/dashboard/dashboard.html');
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      if (username === 'admin' && password === '1234') {
        Auth.setUser({ username: 'admin', role: 'admin', loggedIn: true, loginAt: new Date().toISOString() });
        window.location.replace('/src/pages/dashboard/dashboard.html');
      } else {
        alert('Invalid username or password');
      }
    });
  </script>
</body>
</html>
