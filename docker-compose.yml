services:
  mysql:
    image: mysql:8.4            # 8.4 LTS (caching_sha2_password is the default)
    container_name: mysql-db

    # MySQL environment variables
    environment:
      MYSQL_DATABASE: gramathaankadai_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: app
      MYSQL_PASSWORD: app

    # Host 3307 → container 3306 (avoids clashing with a local MySQL on 3306)
    ports:
      - "3307:3306"

    # Persist MySQL data
    volumes:
      - mysql_data:/var/lib/mysql

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Lightweight DB UI (replaces pgAdmin) — http://localhost:8978
  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: cloudbeaver
    ports:
      - "8978:8978"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  flyway:
    image: flyway/flyway:10

    command: migrate

    # Flyway DB configuration (MySQL)
    environment:
      FLYWAY_URL: jdbc:mysql://mysql:3306/gramathaankadai_db?allowPublicKeyRetrieval=true&useSSL=false
      FLYWAY_USER: root
      FLYWAY_PASSWORD: root
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
      # Greenfield v2: migrate from V1 on an empty database (no baseline skip).
      FLYWAY_BASELINE_ON_MIGRATE: "false"

    volumes:
      - ./db/migrations:/flyway/sql

    depends_on:
      mysql:
        condition: service_healthy

    profiles:
      - migrate

volumes:
  mysql_data:
